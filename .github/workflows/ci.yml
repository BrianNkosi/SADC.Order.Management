name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '9.0.x'
  NODE_VERSION: '22'

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          SA_PASSWORD: YourStrong!Passw0rd
          ACCEPT_EULA: Y
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong!Passw0rd -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore SADC.Order.Management.sln

      - name: Build
        run: dotnet build SADC.Order.Management.sln --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test tests/Unit/SADC.Order.Management.Tests.Unit.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=unit-test-results.trx" --collect:"XPlat Code Coverage"

      - name: Run integration tests
        run: dotnet test tests/Integration/SADC.Order.Management.Tests.Integration.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=integration-test-results.trx"
        env:
          ConnectionStrings__DefaultConnection: "Server=localhost,1433;Database=SadcOrderManagement_Test;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True"

      - name: Publish test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/TestResults/*.trx'

      - name: Generate EF Core migration script
        run: |
          dotnet tool install --global dotnet-ef
          dotnet ef migrations script --project src/Infrastructure/SADC.Order.Management.Infrastructure.csproj --startup-project src/Api/SADC.Order.Management.Api.csproj --idempotent --output migrations.sql
        
      - name: Upload migration script
        uses: actions/upload-artifact@v4
        with:
          name: ef-migration-script
          path: migrations.sql

  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/Web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/Web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/Web/dist

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f src/Api/Dockerfile -t sadc-api:${{ github.sha }} .

      - name: Build Worker image
        run: docker build -f src/Worker/Dockerfile -t sadc-worker:${{ github.sha }} .

      - name: Build Web image
        run: docker build -f src/Web/Dockerfile -t sadc-web:${{ github.sha }} src/Web
